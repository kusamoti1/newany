<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f4f2">
  <title>Any Planner</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=1.8.2">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-left">
        <div class="hero-date-row">
          <div class="hero-day" id="heroDay">15</div>
          <div class="hero-date-copy">
            <div class="hero-month-inline" id="heroMonthInline">3月</div>
            <div class="hero-year" id="heroYear">2026</div>
          </div>
        </div>
        <button class="today-chip" id="todayChip">今日</button>
      </div>
      <div class="hero-right">
        <div class="hero-month-title" id="heroMonthTitle">2026年3月</div>
        <div class="hero-counts"><span id="openCount">未完了 0件</span><span id="doneCount">完了 0件</span></div>
        <div class="hero-version" id="appVersion">v1.8.2</div>
        <div class="hero-actions">
          <button class="pill dark" id="todayBtn">今日</button>
          <button class="icon-btn" id="openMonth" aria-label="月表示">📅</button>
          <button class="icon-btn" id="openSettings" aria-label="設定">⚙︎</button>
        </div>
      </div>
    </header>

    <section class="week-strip" id="weekStrip"></section>

    <section class="quick-picks">
      <div class="quick-head">
        <div>
          <div class="quick-kicker">QUICK TASKS</div>
          <h3>よく使うタスク</h3>
        </div>
        <button class="mini-btn subtle" id="manageTemplates">管理</button>
      </div>
      <div class="category-strip" id="categoryStrip"></div>
      <div class="template-list" id="templateList"></div>
    </section>

    <div class="section-kicker">TIMELINE</div>
    <main class="timeline-wrap">
      <aside class="time-rail" id="timeRail"></aside>

      <section class="timeline-main">
        <div class="wake-row">
          <div class="icon-disc">☀︎</div>
          <article class="fixed-card">
            <div class="fixed-time" id="wakeCardTime">7:00</div>
            <div class="fixed-title">起床</div>
            <button class="check-btn" data-fixed="wake"></button>
          </article>
        </div>

        <div id="currentTimeBadge" class="now-badge">7:28</div>
        <button id="railQuickAdd" class="rail-plus" aria-label="この位置に追加">＋</button>
        <div id="timelineList" class="timeline-list"></div>

        <div class="sleep-row">
          <div class="icon-disc bed">🛏</div>
          <article class="fixed-card sleep-card">
            <div class="fixed-time" id="sleepCardTime">23:00</div>
            <div class="fixed-title">就寝</div>
            <button class="check-btn" data-fixed="sleep"></button>
          </article>
        </div>
      </section>
    </main>

    <button class="floating-add" id="floatingAdd">＋</button>

    <section class="later-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <div class="sheet-label">LATER LIST</div>
          <h2>あとでやる</h2>
        </div>
        <button class="sheet-add" id="addLater">＋</button>
      </div>
      <div class="later-list" id="laterList"></div>
    </section>
  </div>

  <section id="editor" class="overlay hidden">
    <div class="editor-modal">
      <div class="editor-header">
        <button class="ghost-btn" id="closeEditor">×</button>
        <div class="editor-header-copy">
          <div class="editor-state" id="editorState">予定</div>
          <div class="editor-title">タスク</div>
        </div>
        <button class="save-btn" id="saveTask">保存</button>
      </div>
      <div class="editor-body">
        <input id="taskTitle" class="text-input" placeholder="タイトル">
        <textarea id="taskNote" class="text-area" placeholder="メモ"></textarea>
        <div class="template-save-row">
          <label class="template-label">
            <span>登録カテゴリ</span>
            <select id="templateCategory" class="text-input">
              <option value="work">仕事</option>
              <option value="home">家</option>
              <option value="personal">個人</option>
            </select>
          </label>
          <button id="saveTemplate" type="button" class="mini-btn subtle">このタイトルを登録</button>
        </div>
        <label class="upload-row">
          <span>画像</span>
          <input id="taskImage" type="file" accept="image/*" class="text-input file-input">
          <div id="imagePreviewWrap" class="image-preview-wrap hidden">
            <img id="imagePreview" class="image-preview" alt="添付画像プレビュー">
            <button id="removeImage" type="button" class="mini-btn remove-image-btn">画像を外す</button>
          </div>
        </label>
        <div class="editor-grid">
          <label>
            <span>日付</span>
            <input id="taskDate" type="date" class="text-input">
          </label>
          <label>
            <span>時刻</span>
            <input id="taskTime" type="time" class="text-input">
          </label>
        </div>
        <div class="quick-time-row">
          <button class="soft-pill" data-time="09:00">朝</button>
          <button class="soft-pill" data-time="12:30">昼</button>
          <button class="soft-pill" data-time="17:30">夕方</button>
          <button class="soft-pill" data-time="20:00">夜</button>
        </div>
        <label class="toggle-row">
          <span>あとでに入れる</span>
          <input id="taskLater" type="checkbox">
        </label>
      </div>
    </div>
  </section>

  <section id="monthSheet" class="overlay hidden">
    <div class="calendar-modal">
      <div class="calendar-head">
        <button class="ghost-btn" id="monthPrev">‹</button>
        <div class="calendar-title" id="calendarTitle"></div>
        <button class="ghost-btn" id="monthNext">›</button>
        <button class="ghost-btn" id="closeMonth">閉じる</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>

  <section id="settingsSheet" class="overlay hidden">
    <div class="settings-modal">
      <div class="calendar-head">
        <div class="calendar-title">設定</div>
        <button class="ghost-btn" id="closeSettings">閉じる</button>
      </div>
      <label class="setting-row"><span>朝の時刻</span><input id="wakeTime" type="time" value="07:00"></label>
      <label class="setting-row"><span>夜の時刻</span><input id="sleepTime" type="time" value="23:00"></label>
    </div>
  </section>

  <section id="templateSheet" class="overlay hidden">
    <div class="settings-modal">
      <div class="calendar-head">
        <div class="calendar-title">登録したタスク</div>
        <button class="ghost-btn" id="closeTemplateSheet">閉じる</button>
      </div>
      <div id="customTemplateList" class="custom-template-list"></div>
    </div>
  </section>

  <script src="app.js?v=1.8.2"></script>
</body>
</html>
